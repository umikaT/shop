<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Rejestracja</title>
    <link rel="stylesheet" href="auth.css">
    <script src="auth.js" defer></script>
</head>
<body>

<div class="auth-container">
    <h2>Rejestracja</h2>

    <form action="php/register.php" method="POST" onsubmit="return validateRegister()">
        <input type="text" id="username" name="username" placeholder="Nazwa użytkownika">
        <input type="email" id="email" name="email" placeholder="Email">
        <input type="password" id="password" name="password" placeholder="Hasło">
        <input type="password" id="password2" name="password2" placeholder="Powtórz hasło">

        <div id="regError" class="error"></div>

        <button type="submit">Zarejestruj</button>

        <button type="button" class="back-btn" onclick="goBack()">Powrót</button>
    </form>
</div>

</body>
</html>
